<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ChatSphere — AI-powered multi-provider chat platform with real-time collaboration, smart replies, and memory extraction." />
    <meta name="keywords" content="AI chat, multi-provider AI, ChatSphere, real-time chat, AI collaboration, OpenRouter, Gemini, Groq" />
    <meta name="author" content="ChatSphere" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://chatsphere.app" />
    <meta name="theme-color" content="#0D0F1A" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ChatSphere — Multi-Provider AI Chat" />
    <meta property="og:description" content="AI-powered multi-provider chat platform with real-time collaboration, smart replies, and memory extraction." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:url" content="https://chatsphere.app" />
    <meta property="og:site_name" content="ChatSphere" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ChatSphere — Multi-Provider AI Chat" />
    <meta name="twitter:description" content="AI-powered multi-provider chat platform with real-time collaboration, smart replies, and memory extraction." />
    <meta name="twitter:image" content="/og-image.svg" />

    <title>ChatSphere — Multi-Provider AI Chat</title>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ChatSphere",
      "url": "https://chatsphere.app",
      "description": "AI-powered multi-provider chat platform with real-time collaboration, smart replies, and memory extraction.",
      "applicationCategory": "CommunicationApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Multi-provider AI support (OpenRouter, Gemini, Groq, Together AI, xAI, Hugging Face)",
        "Real-time group chat with Socket.IO",
        "AI memory and context extraction",
        "Smart reply suggestions",
        "Code syntax highlighting",
        "Markdown rendering"
      ]
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
