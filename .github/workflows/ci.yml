# =============================================================================
# ChatSphere CI/CD Pipeline
# =============================================================================
#
# PURPOSE:
# Automated testing and validation on every push and pull request.
# Ensures code quality before merging to main branch.
#
# TRIGGERS:
# - Push to any branch
# - Pull request to main
#
# JOBS:
# 1. frontend-test: Run frontend tests and type checking
# 2. backend-test: Run backend tests and syntax checking
# 3. build: Verify frontend builds successfully
#
# WHY GITHUB ACTIONS:
# - Free for public repositories
# - Tight GitHub integration
# - Large marketplace of actions
# - Supports matrix builds
# =============================================================================

name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Frontend Tests
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run type checking
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Backend Tests
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check JavaScript syntax
        working-directory: backend
        run: |
          find . -name "*.js" -not -path "*/node_modules/*" -exec node --check {} \;

      - name: Run tests
        working-directory: backend
        run: npm run test

  # ---------------------------------------------------------------------------
  # Build Verification
  # ---------------------------------------------------------------------------
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify build output
        run: |
          if [ -d "frontend/dist" ]; then
            echo "✓ Frontend build successful"
            ls -la frontend/dist/
          else
            echo "✗ Frontend build failed"
            exit 1
          fi
